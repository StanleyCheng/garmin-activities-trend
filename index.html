  <style>
    :root {
      color-scheme: light;
      --forest: #3d852e;
      --leaf: #9ada78;
      --cream: #fff09c;
      --orange: #ffa22b;
      --ink: #20321e;
      --muted: #687663;
      --line: #dbe4d3;
      --panel: #ffffff;
      --page: #f7f8ef;
      --soft-leaf: rgba(154, 218, 120, 0.18);
      --soft-orange: rgba(255, 162, 43, 0.14);
    }
    * {
      box-sizing: border-box;
    }
    html {
      -webkit-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
      line-height: 1.45;
    }
    .page {
      min-height: 100vh;
      padding-bottom: 24px;
    }
    .topbar {
      background: linear-gradient(135deg, var(--forest), #2f6f24);
      color: #ffffff;
      position: relative;
      overflow: hidden;
    }
    .topbar::after {
      content: "";
      position: absolute;
      inset: auto -8% -56px auto;
      width: min(420px, 56vw);
      height: 180px;
      background: linear-gradient(90deg, var(--leaf), var(--cream), var(--orange));
      border-radius: 999px 0 0 0;
      opacity: 0.95;
    }
    .topbar-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 24px;
      display: flex;
      justify-content: space-between;
      gap: 28px;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }
    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(28px, 4.5vw, 50px);
      line-height: 1.02;
      font-weight: 750;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .summary {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }
    .metric {
      min-width: 136px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 14px;
      padding: 14px 16px 13px;
      background: rgba(255, 255, 255, 0.13);
      box-shadow: 0 16px 34px rgba(16, 50, 18, 0.18);
      backdrop-filter: blur(12px);
    }
    .metric:nth-child(2) {
      background: rgba(255, 240, 156, 0.18);
    }
    .metric-label {
      color: rgba(255, 255, 255, 0.76);
      font-size: 11px;
      font-weight: 650;
      text-transform: uppercase;
    }
    .metric-value {
      margin-top: 3px;
      font-size: 26px;
      line-height: 1;
      font-weight: 800;
    }
    .metric-value.compact {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
      line-height: 1.2;
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 18px auto 0;
    }
    .controls {

      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-end;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      margin-bottom: 16px;
      box-shadow: 0 14px 38px rgba(60, 80, 52, 0.08);
    }
    .control-field {
      min-width: 0;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }
    select {
      min-width: 240px;
      height: 42px;
      border: 1px solid #cfdcc6;
      border-radius: 10px;
      background: #ffffff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 650;
      padding: 0 36px 0 12px;
    }
    select:focus {
      outline: 3px solid rgba(154, 218, 120, 0.35);
      border-color: var(--forest);
    }
    .chart-shell {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 18px 52px rgba(60, 80, 52, 0.12);
    }
    #chart {
      width: 100%;
      height: min(640px, calc(100vh - 220px));
      min-height: 430px;
    }
    @media (max-width: 900px) {
      .topbar-inner {
        align-items: stretch;
        flex-direction: column;
      }
      .summary {
        justify-content: flex-start;
      }
      .metric {

      }
      #chart {

      }

    @media (max-width: 720px) {

      }

        inset: auto -22% -64px auto;
        width: 320px;
        height: 150px;

      }
      .topbar-inner {
        padding-top: 10px;
        padding-bottom: 10px;
        width: min(100% - 24px, 1180px);
        gap: 8px;
      }
      h1 {
        font-size: clamp(18px, 5.7vw, 28px);
        max-width: 100%;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
      }
      .user-metric {

      }
      .metric {
        min-width: 0;
        padding: 6px 5px;
        border-radius: 9px;
      }
      .metric-label {
        color: #ffffff;
        font-size: 7.5px;
        line-height: 1;
        font-weight: 600;
        letter-spacing: 0;
        text-shadow: 0 1px 2px rgba(20, 45, 17, 0.58);
        white-space: nowrap;
      }
      .metric-value {
        font-size: 16px;
        font-weight: 650;
      }
      .metric-value.compact {
        max-width: none;
        font-size: 11px;
      }
      main {
        width: min(100% - 24px, 1180px);
        margin-top: 8px;
      }
      .controls {
        display: grid;
        grid-template-columns: 0.8fr 0.9fr 1.35fr;
        padding: 8px;
        gap: 6px;
        margin-bottom: 8px;
        border-radius: 12px;
      }
      label {
        margin-bottom: 3px;
        font-size: 9px;
      }
      select {
        min-width: 100%;

        height: 34px;
        border-radius: 8px;
        font-size: 12px;
        padding: 0 20px 0 7px;
      }
      .controls > div {
        width: auto;
      }
      .chart-shell {
        border-radius: 12px;
      }
      #chart {
        height: min(76vh, 620px);
        min-height: 470px;
      }
    }
    @media (max-width: 420px) {
      .topbar-inner {
        width: min(100% - 16px, 1180px);

      }
      select {
        height: 32px;
        font-size: 11px;
      }
      #chart {
        height: 78vh;
        min-height: 500px;
      }

    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    const monthSelect = document.getElementById("monthSelect");
    const parameterSelect = document.getElementById("parameterSelect");
    const activityCount = document.getElementById("activityCount");
    const yearCount = document.getElementById("yearCount");
    const garminUser = document.getElementById("garminUser");
    const monthlyMileage = document.getElementById("monthlyMileage");
    const monthlyActivities = document.getElementById("monthlyActivities");

    function populateSelect(selectElem, values) {
      values.forEach((value) => {
        const option = document.createElement("option");
        if (Array.isArray(value)) {
          option.value = value[0];
          option.textContent = value[1];
        } else {
          option.value = value;
          option.textContent = value;
        }
        selectElem.appendChild(option);
      });
    }

    function getYLabel(parameter) {
      if (parameter === "Avg Distance") {
        return "Kilometers";
      }
      if (parameter === "Heart Rate" || parameter === "maxHR") {
        return "Beats per minute";
      }
      if (parameter === "Pace") {
        return "Seconds per km";
      }
      if (parameter === "Duration") {
        return "Seconds";
      }
      if (parameter === "Calories") {
        return "Calories";
      }
      if (parameter === "avgElevation" || parameter === "maxElevation") {
        return "Elevation";
      }
      if (parameter === "MaxSpeed") {
        return "Speed";
      }
      if (parameter === "Vo2maxvalue") {
        return "VO2 max";
      }
      return parameter;
    }

    function isSecondsParameter(parameter) {
      return parameter === "Pace" || parameter === "Duration";
    }

    function formatSeconds(totalSeconds) {
      if (totalSeconds === null || totalSeconds === undefined || Number.isNaN(totalSeconds)) {
        return "";
      }
      const roundedSeconds = Math.round(totalSeconds);
      const hours = Math.floor(roundedSeconds / 3600);
      const minutes = Math.floor((roundedSeconds % 3600) / 60);
      const seconds = roundedSeconds % 60;
      return [hours, minutes, seconds]
        .map((value) => String(value).padStart(2, "0"))
        .join(":");
    }

    function getSecondsTickConfig(yValues) {
      const numericValues = yValues.filter((value) => value !== null && value !== undefined);
      if (!numericValues.length) {
        return {};
      }

      const minValue = Math.min(...numericValues);
      const maxValue = Math.max(...numericValues);
      if (minValue === maxValue) {
        return {
          tickmode: "array",
          tickvals: [minValue],
          ticktext: [formatSeconds(minValue)]
        };
      }

      const tickCount = 5;
      const step = (maxValue - minValue) / (tickCount - 1);
      const tickvals = Array.from({ length: tickCount }, (_, index) => minValue + step * index);
      return {
        tickmode: "array",
        tickvals,
        ticktext: tickvals.map(formatSeconds)
      };
    }

    function formatMileage(value) {
      if (value === null || value === undefined || Number.isNaN(value)) {
        return "0 km/mo";
      }
      return `${value.toLocaleString(undefined, { maximumFractionDigits: 1 })} km`;
    }

    function updateSummary(year, monthIndex) {
      const mileageValues = chartData.monthlyMileage[year] || [];
      const activityCounts = chartData.monthlyActivityCounts[year] || [];
      const selectedMileage = mileageValues[monthIndex] || 0;
      const selectedActivityCount = activityCounts[monthIndex] || 0;

      garminUser.textContent = chartData.garminUsername;
      monthlyMileage.textContent = formatMileage(selectedMileage);
      monthlyActivities.textContent = selectedActivityCount.toLocaleString();
    }

    function getLatestActiveMonthIndex(year) {
      const activityCounts = chartData.monthlyActivityCounts[year] || [];
      for (let index = activityCounts.length - 1; index >= 0; index -= 1) {
        if (activityCounts[index] > 0) {
          return index;
        }
      }
      return new Date().getMonth();
    }

    function getChartMargin() {
      if (window.matchMedia("(max-width: 420px)").matches) {
        return { l: 40, r: 8, t: 34, b: 32 };
      }
      if (window.matchMedia("(max-width: 720px)").matches) {
        return { l: 44, r: 10, t: 38, b: 34 };
      }
      return { l: 68, r: 28, t: 68, b: 56 };
    }

    function getTitleSize() {
      return window.matchMedia("(max-width: 720px)").matches ? 14 : 20;
    }

    function getTickSize() {
      return window.matchMedia("(max-width: 720px)").matches ? 10 : 12;
    }

    function renderChart() {
      const year = yearSelect.value;
      const monthIndex = Number(monthSelect.value);
      const parameter = parameterSelect.value;
      const yValues = chartData.values[year][parameter];
      const secondsParameter = isSecondsParameter(parameter);
      const hoverValues = secondsParameter ? yValues.map(formatSeconds) : yValues;
      const markerSizes = months.map((_, index) => index === monthIndex ? 12 : 8);
      const markerColors = months.map((_, index) => index === monthIndex ? "#ffa22b" : "#9ada78");

      const trace = {
        x: months,
        y: yValues,
        customdata: hoverValues,
        type: "scatter",
        mode: "lines+markers",
        line: { color: "#3d852e", width: 3, shape: "spline", smoothing: 0.35 },
        marker: {
          size: markerSizes,
          color: markerColors,
          line: { color: "#ffffff", width: 2 }
        },
        fill: "tozeroy",
        fillcolor: "rgba(154, 218, 120, 0.18)",
        hovertemplate: secondsParameter
          ? "%{x}<br>%{customdata}<extra></extra>"
          : "%{x}<br>%{y:.2f}<extra></extra>"
      };

      const yAxisConfig = {
        title: { text: getYLabel(parameter), font: { color: "#687663", family: "Avenir Next, Segoe UI, sans-serif" } },
        tickfont: { color: "#687663", size: getTickSize(), family: "Avenir Next, Segoe UI, sans-serif" },
        gridcolor: "rgba(104, 118, 99, 0.16)",
        zerolinecolor: "rgba(104, 118, 99, 0.24)",
        ...(secondsParameter ? getSecondsTickConfig(yValues) : {})
      };

      const layout = {
        title: {
          text: `${parameter} Trend in ${year}`,
          x: 0,
          xanchor: "left",
          font: { size: getTitleSize(), color: "#20321e", family: "Avenir Next, Segoe UI, sans-serif" }
        },
        paper_bgcolor: "#ffffff",
        plot_bgcolor: "#fbfcf6",
        xaxis: {
          title: "",
          tickfont: { color: "#687663", size: getTickSize(), family: "Avenir Next, Segoe UI, sans-serif" },
          gridcolor: "rgba(104, 118, 99, 0.16)",
          zeroline: false
        },
        yaxis: yAxisConfig,
        shapes: [{
          type: "line",
          xref: "x",
          yref: "paper",
          x0: months[monthIndex],
          x1: months[monthIndex],
          y0: 0,
          y1: 1,
          line: { color: "rgba(255, 162, 43, 0.48)", width: 2, dash: "dot" }
        }],
        hovermode: "x unified",
        margin: getChartMargin()
      };

      const config = {
        responsive: true,
        displaylogo: false,
        modeBarButtonsToRemove: ["lasso2d", "select2d"]
      };

      Plotly.newPlot("chart", [trace], layout, config);
      updateSummary(year, monthIndex);
    }

    activityCount.textContent = chartData.activityCount.toLocaleString();
    yearCount.textContent = chartData.years.length.toLocaleString();
    garminUser.textContent = chartData.garminUsername;
    populateSelect(yearSelect, chartData.years);
    populateSelect(monthSelect, months.map((month, index) => [index, month]));
    populateSelect(parameterSelect, chartData.parameters);
    yearSelect.value = chartData.years[chartData.years.length - 1];
    monthSelect.value = String(getLatestActiveMonthIndex(yearSelect.value));
    parameterSelect.value = chartData.parameters[0];
    yearSelect.addEventListener("change", () => {
      monthSelect.value = String(getLatestActiveMonthIndex(yearSelect.value));
      renderChart();
    });
    monthSelect.addEventListener("change", renderChart);
    parameterSelect.addEventListener("change", renderChart);
    window.addEventListener("resize", () => Plotly.Plots.resize("chart"));
    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        renderChart();
        Plotly.Plots.resize("chart");
      }, 250);
    });
    renderChart();
